<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
</head>
<body>
    <h2>Real Estate Price Prediction</h2>

    <input id="sqft" placeholder="Total Sqft"><br><br>
    <input id="bhk" placeholder="BHK"><br><br>
    <input id="bath" placeholder="Bathrooms"><br><br>
    <input id="location" placeholder="Location"><br><br>

    <button onclick="predict()">Predict Price</button>

    <h3 id="result"></h3>

    <script>
        function predict() {
            fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    sqft: document.getElementById("sqft").value,
                    bhk: document.getElementById("bhk").value,
                    bath: document.getElementById("bath").value,
                    location: document.getElementById("location").value
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText =
                    "Predicted Price: ₹ " + data.predicted_price + " Lakhs";
            });
        }
    </script>
</body>
</html>
